name: Tests

on:
  pull_request:

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  PRIVATE_REPO_ACCESS_TOKEN: ${{ secrets.ACTIONS_PRIVATE_REPO_RO_TOKEN }}
  STATA_LICENSE: ${{ secrets.STATA_LICENSE }}

permissions:
  contents: read

jobs:

  check:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: opensafely-core/setup-action@93841f27c28c75bf85b1a0a915e2391a06c6c8a6 # v1
        with:
          install-just: true
          install-uv: true
          cache: uv
      - name: Check formatting, linting and import sorting
        run: just check

  test-job:
    runs-on: ubuntu-24.04
    name: Run test suite
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
         persist-credentials: false
      - uses: opensafely-core/setup-action@93841f27c28c75bf85b1a0a915e2391a06c6c8a6 # v1
        with:
          install-just: true
          install-uv: true
          cache: uv
      - name: Run tests
        run: |
          just devenv
          just test -vvv

  test-docker:
    runs-on: ubuntu-24.04
    name: Test docker image
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3

      - name: Build image
        run: just docker/build

      - name: Run tests in docker-image
        run: just docker/test

      - name: Run basic multi-container integration test
        run: just docker/functional-test

  required-checks:
    if: always()

    needs:
      - check
      - test-job
      - test-docker

    runs-on: Ubuntu-latest

    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
