generation.max-examples = 100
headers = { Authorization = "token" }
continue-on-failure = true

[output.sanitization]
enabled = false

[[operations]]
include-name = "POST /{backend}/cancel/"
# Turn off positive_data_acceptance check as it can't understand custom
# validation for validly shaped data. i.e. if we post a job request id and actions
# that don't exists, we'll get an unexpected (as far as schemathesis is concerned)
# 400
# See suggestion from schemathesis author to do just this: https://github.com/schemathesis/schemathesis/issues/2710#issuecomment-2622411255
# We expect the validation to be covered in unit tests, so we just ignore for api spec tests
# for now.
checks.positive_data_acceptance.enabled = false

# Ensure we test with realistic parameters. We do this as 2 projects so we can test both the
# happy (test) backend and 404 (tpp) backend - this assumes our test .env only has config for the
# test backend
[[project]]
title = "Test backend"
parameters = { backend = 'test'}

[[project]]
title = "TPP backend"
parameters = { backend = 'tpp' }
